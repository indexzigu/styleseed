<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="680" fill="#FAFAFA"/>
  <rect x="0.5" y="0.5" width="1199" height="679" fill="none" stroke="#EDEDED"/>

  <!-- title -->
  <text x="600" y="74" text-anchor="middle" fill="#9CA3AF" font-size="13" font-weight="700" letter-spacing="3.5">DESIGN JUDGMENT, VISUALIZED</text>
  <text x="600" y="116" text-anchor="middle" fill="#111827" font-size="30" font-weight="800" letter-spacing="-0.5">Every decision is a rule — with a reason.</text>

  <!-- ===== the UI card (center) ===== -->
  <g filter="url(#cardShadow)">
    <rect x="460" y="232" width="280" height="244" rx="18" fill="#FFFFFF"/>
  </g>

  <!-- card content -->
  <text x="486" y="276" fill="#9CA3AF" font-size="11" font-weight="700" letter-spacing="1.5">TOTAL BALANCE</text>
  <text x="486" y="330" fill="#111827" font-size="46" font-weight="800" letter-spacing="-1">$3.84<tspan fill="#9CA3AF" font-size="23" font-weight="700"> M</tspan></text>
  <text x="486" y="364" fill="#16A34A" font-size="15" font-weight="700">▲ +12.4%<tspan dx="6" fill="#9CA3AF" font-weight="500">vs last month</tspan></text>
  <line x1="486" y1="388" x2="714" y2="388" stroke="#F1F5F9" stroke-width="1"/>
  <!-- buttons -->
  <rect x="486" y="406" width="138" height="42" rx="11" fill="#3182F6"/>
  <text x="555" y="432" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">Send $2,400</text>
  <rect x="632" y="406" width="82" height="42" rx="11" fill="#F1F5F9"/>
  <text x="673" y="432" text-anchor="middle" fill="#475569" font-size="14" font-weight="700">Cancel</text>

  <!-- ===== leader lines ===== -->
  <g stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 4">
    <path d="M360 268 L460 256"/>
    <path d="M360 322 L460 318"/>
    <path d="M360 430 L460 426"/>
    <path d="M740 252 L840 258"/>
    <path d="M740 356 L840 350"/>
    <path d="M740 430 L840 432"/>
  </g>
  <g fill="#3182F6">
    <circle cx="460" cy="256" r="3"/>
    <circle cx="460" cy="318" r="3"/>
    <circle cx="460" cy="426" r="3"/>
    <circle cx="740" cy="258" r="3"/>
    <circle cx="740" cy="350" r="3"/>
    <circle cx="740" cy="432" r="3"/>
  </g>

  <!-- ===== left labels (right-aligned) ===== -->
  <g text-anchor="end">
    <text x="350" y="264" fill="#111827" font-size="15" font-weight="700">Rule 1 · Content in cards</text>
    <text x="350" y="284" fill="#9CA3AF" font-size="12.5">tonal separation, not borders</text>

    <text x="350" y="318" fill="#111827" font-size="15" font-weight="700">Rule 4 · Numbers 2:1 with units</text>
    <text x="350" y="338" fill="#9CA3AF" font-size="12.5">the eye locks onto magnitude first</text>

    <text x="350" y="426" fill="#111827" font-size="15" font-weight="700">Rule 2 + §C0 · One accent</text>
    <text x="350" y="446" fill="#9CA3AF" font-size="12.5">scarcity makes the CTA unmissable</text>
  </g>

  <!-- ===== right labels (left-aligned) ===== -->
  <g text-anchor="start">
    <text x="850" y="254" fill="#111827" font-size="15" font-weight="700">§C0 · One corner radius</text>
    <text x="850" y="274" fill="#9CA3AF" font-size="12.5">card, button, input all agree</text>

    <text x="850" y="346" fill="#111827" font-size="15" font-weight="700">Rule 72 · Never color alone</text>
    <text x="850" y="366" fill="#9CA3AF" font-size="12.5">pair the +/- with an icon</text>

    <text x="850" y="428" fill="#111827" font-size="15" font-weight="700">Rule 71 · Real states</text>
    <text x="850" y="448" fill="#9CA3AF" font-size="12.5">empty · loading · error · success</text>
  </g>

  <!-- ===== bottom thesis ===== -->
  <line x1="360" y1="556" x2="840" y2="556" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="596" text-anchor="middle" fill="#374151" font-size="18" font-weight="600">Other repos hand your AI <tspan fill="#9CA3AF">components</tspan>. StyleSeed hands it the <tspan fill="#111827" font-weight="800">judgment</tspan>.</text>
  <text x="600" y="626" text-anchor="middle" fill="#9CA3AF" font-size="13" font-weight="600" letter-spacing="0.5">74 rules · 15 AI skills · 7 brand skins · MIT — github.com/bitjaru/styleseed</text>
</svg>
