<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="cs" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="#FAFAFA"/>
  <rect x="0.5" y="0.5" width="1199" height="679" fill="none" stroke="#EDEDED"/>

  <!-- title -->
  <text x="600" y="70" text-anchor="middle" fill="#9CA3AF" font-size="13" font-weight="700" letter-spacing="3.5">WHY AI-BUILT UI LOOKS OFF</text>
  <text x="600" y="112" text-anchor="middle" fill="#111827" font-size="29" font-weight="800" letter-spacing="-0.5">It&#39;s not the parts — it&#39;s that they don&#39;t agree.</text>

  <!-- tags -->
  <rect x="160" y="140" width="74" height="23" rx="11.5" fill="#FEE2E2"/>
  <text x="197" y="156" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="800" letter-spacing="1">MIXED</text>
  <rect x="660" y="140" width="118" height="23" rx="11.5" fill="#D1FAE5"/>
  <text x="719" y="156" text-anchor="middle" fill="#059669" font-size="11" font-weight="800" letter-spacing="1">ONE SYSTEM</text>

  <!-- ===== LEFT card (mixed) — sharp card, but everything else disagrees ===== -->
  <g filter="url(#cs)"><rect x="160" y="172" width="380" height="296" rx="4" fill="#FFFFFF"/></g>
  <!-- header: full-round avatar -->
  <circle cx="202" cy="214" r="18" fill="#D1D5DB"/>
  <text x="232" y="210" fill="#000000" font-size="15" font-weight="700">Jordan Lee</text>
  <text x="232" y="228" fill="#9CA3AF" font-size="12">Pro plan</text>
  <!-- value in a RED accent (color #1) -->
  <text x="184" y="284" fill="#EF4444" font-size="28" font-weight="800">$1,240</text>
  <!-- GREEN badge (color #2) -->
  <rect x="300" y="266" width="66" height="22" rx="11" fill="#10B98122"/>
  <text x="333" y="281" text-anchor="middle" fill="#10B981" font-size="10" font-weight="800">ACTIVE</text>
  <!-- usage row + RED progress -->
  <line x1="184" y1="312" x2="516" y2="312" stroke="#F1F5F9"/>
  <text x="184" y="340" fill="#6B7280" font-size="13">Storage</text>
  <text x="516" y="340" text-anchor="end" fill="#000000" font-size="13" font-weight="700">68%</text>
  <rect x="184" y="352" width="332" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="184" y="352" width="226" height="6" rx="3" fill="#EF4444"/>
  <!-- buttons: pill + sharp (BLUE accent #3) -->
  <rect x="184" y="408" width="150" height="40" rx="20" fill="#3182F6"/>
  <text x="259" y="433" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">Upgrade</text>
  <rect x="344" y="408" width="92" height="40" rx="3" fill="none" stroke="#E5E7EB"/>
  <text x="390" y="433" text-anchor="middle" fill="#374151" font-size="13" font-weight="700">Cancel</text>
  <!-- left annotation -->
  <text x="160" y="500" fill="#DC2626" font-size="13" font-weight="600">✗ 3 corner radii · 3 accent colors · pure-black text</text>

  <!-- vs -->
  <circle cx="600" cy="320" r="23" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="600" y="326" text-anchor="middle" fill="#9CA3AF" font-size="14" font-weight="700" font-style="italic">vs</text>

  <!-- ===== RIGHT card (unified) — one radius, one accent, tinted greys ===== -->
  <g filter="url(#cs)"><rect x="660" y="172" width="380" height="296" rx="12" fill="#FFFFFF"/></g>
  <rect x="684" y="196" width="36" height="36" rx="12" fill="#D1D5DB"/>
  <text x="732" y="210" fill="#1F2937" font-size="15" font-weight="700">Jordan Lee</text>
  <text x="732" y="228" fill="#9CA3AF" font-size="12">Pro plan</text>
  <text x="684" y="284" fill="#1F2937" font-size="28" font-weight="800">$1,240</text>
  <rect x="800" y="266" width="66" height="22" rx="11" fill="#F1F5F9"/>
  <text x="833" y="281" text-anchor="middle" fill="#64748B" font-size="10" font-weight="800">ACTIVE</text>
  <line x1="684" y1="312" x2="1016" y2="312" stroke="#F1F5F9"/>
  <text x="684" y="340" fill="#6B7280" font-size="13">Storage</text>
  <text x="1016" y="340" text-anchor="end" fill="#1F2937" font-size="13" font-weight="700">68%</text>
  <rect x="684" y="352" width="332" height="6" rx="3" fill="#F1F5F9"/>
  <rect x="684" y="352" width="226" height="6" rx="3" fill="#3182F6"/>
  <rect x="684" y="408" width="150" height="40" rx="12" fill="#3182F6"/>
  <text x="759" y="433" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">Upgrade</text>
  <rect x="844" y="408" width="92" height="40" rx="12" fill="#F1F5F9"/>
  <text x="890" y="433" text-anchor="middle" fill="#475569" font-size="13" font-weight="700">Cancel</text>
  <text x="660" y="500" fill="#059669" font-size="13" font-weight="600">✓ one radius · one accent · tinted greys</text>

  <!-- bottom thesis -->
  <line x1="220" y1="560" x2="980" y2="560" stroke="#E5E7EB"/>
  <text x="600" y="600" text-anchor="middle" fill="#374151" font-size="18" font-weight="600">Same content. The only difference is <tspan fill="#111827" font-weight="800">coherence</tspan>.</text>
  <text x="600" y="632" text-anchor="middle" fill="#9CA3AF" font-size="13" font-weight="600">StyleSeed gives your AI the judgment to make the parts agree — github.com/bitjaru/styleseed</text>
</svg>
