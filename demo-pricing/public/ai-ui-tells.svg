<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="cs" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#FAFAFA"/>
  <rect x="0.5" y="0.5" width="1199" height="699" fill="none" stroke="#EDEDED"/>

  <!-- title -->
  <text x="600" y="62" text-anchor="middle" fill="#9CA3AF" font-size="13" font-weight="700" letter-spacing="3.5">STILL LOOKS AI-GENERATED?</text>
  <text x="600" y="104" text-anchor="middle" fill="#111827" font-size="30" font-weight="800" letter-spacing="-0.5">5 tells that say “a robot made this”</text>

  <!-- rows -->
  <!-- row template: card + number + ✗ tell + ✓ fix -->
  <g>
    <!-- 1 -->
    <g filter="url(#cs)"><rect x="120" y="138" width="960" height="86" rx="16" fill="#FFFFFF"/></g>
    <circle cx="168" cy="181" r="18" fill="#EF4444"/>
    <text x="168" y="187" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="800">1</text>
    <text x="206" y="176" fill="#111827" font-size="18" font-weight="700">Pure-black (#000) text</text>
    <text x="206" y="201" fill="#6B7280" font-size="14">→ the refined black is <tspan font-weight="700" fill="#374151">#2A2A2A</tspan>, not #000 · Rule 3</text>

    <!-- 2 -->
    <g filter="url(#cs)"><rect x="120" y="236" width="960" height="86" rx="16" fill="#FFFFFF"/></g>
    <circle cx="168" cy="279" r="18" fill="#EF4444"/>
    <text x="168" y="285" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="800">2</text>
    <text x="206" y="274" fill="#111827" font-size="18" font-weight="700">Three or more accent colors</text>
    <text x="206" y="299" fill="#6B7280" font-size="14">→ <tspan font-weight="700" fill="#374151">one accent</tspan>, everything else greyscale · Rule 2 / coherence</text>

    <!-- 3 -->
    <g filter="url(#cs)"><rect x="120" y="334" width="960" height="86" rx="16" fill="#FFFFFF"/></g>
    <circle cx="168" cy="377" r="18" fill="#EF4444"/>
    <text x="168" y="383" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="800">3</text>
    <text x="206" y="372" fill="#111827" font-size="18" font-weight="700">Mixed corners — sharp card, pill buttons</text>
    <text x="206" y="397" fill="#6B7280" font-size="14">→ pick <tspan font-weight="700" fill="#374151">one radius personality</tspan> and apply it everywhere</text>

    <!-- 4 -->
    <g filter="url(#cs)"><rect x="120" y="432" width="960" height="86" rx="16" fill="#FFFFFF"/></g>
    <circle cx="168" cy="475" r="18" fill="#EF4444"/>
    <text x="168" y="481" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="800">4</text>
    <text x="206" y="470" fill="#111827" font-size="18" font-weight="700">Everything the same size &amp; weight</text>
    <text x="206" y="495" fill="#6B7280" font-size="14">→ hierarchy by <tspan font-weight="700" fill="#374151">size + weight</tspan>; numbers 2:1 with their unit · Rule 4</text>

    <!-- 5 -->
    <g filter="url(#cs)"><rect x="120" y="530" width="960" height="86" rx="16" fill="#FFFFFF"/></g>
    <circle cx="168" cy="573" r="18" fill="#EF4444"/>
    <text x="168" y="579" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="800">5</text>
    <text x="206" y="568" fill="#111827" font-size="18" font-weight="700">No empty / loading / error states</text>
    <text x="206" y="593" fill="#6B7280" font-size="14">→ design <tspan font-weight="700" fill="#374151">all four states</tspan>, not just “full” · Rule 71</text>
  </g>

  <!-- footer -->
  <text x="600" y="660" text-anchor="middle" fill="#374151" font-size="16" font-weight="600">It’s not the components. It’s that the parts don’t <tspan font-weight="800" fill="#111827">agree</tspan>. — github.com/bitjaru/styleseed</text>
</svg>
