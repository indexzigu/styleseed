<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="cs" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#FAFAFA"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#ECECEC"/>

  <!-- logo -->
  <rect x="72" y="62" width="42" height="42" rx="11" fill="#111827"/>
  <text x="93" y="91" text-anchor="middle" fill="#FFFFFF" font-size="21" font-weight="800">S</text>
  <text x="126" y="92" fill="#111827" font-size="23" font-weight="800" letter-spacing="-0.3">StyleSeed</text>

  <!-- eyebrow -->
  <text x="72" y="172" fill="#9CA3AF" font-size="14" font-weight="700" letter-spacing="2.5">DESIGN ENGINE · CLAUDE CODE · CURSOR · CODEX</text>

  <!-- headline -->
  <text x="70" y="240" fill="#111827" font-size="56" font-weight="800" letter-spacing="-1.5">Teach your AI</text>
  <text x="70" y="304" fill="#111827" font-size="56" font-weight="800" letter-spacing="-1.5">design <tspan fill="#3182F6">judgment</tspan>.</text>
  <text x="70" y="368" fill="#9CA3AF" font-size="56" font-weight="800" letter-spacing="-1.5">Not just components.</text>

  <!-- subline -->
  <text x="72" y="430" fill="#6B7280" font-size="19" font-weight="500">74 design rules your AI reads automatically —</text>
  <text x="72" y="458" fill="#6B7280" font-size="19" font-weight="500">so the output stops looking generated.</text>

  <!-- footer -->
  <text x="72" y="556" fill="#374151" font-size="15" font-weight="700">74 rules · 15 skills · 7 brand skins · MIT</text>
  <text x="72" y="582" fill="#9CA3AF" font-size="14" font-weight="600">github.com/bitjaru/styleseed</text>

  <!-- right: the "designed" result card -->
  <g filter="url(#cs)"><rect x="788" y="178" width="340" height="248" rx="18" fill="#FFFFFF"/></g>
  <text x="820" y="222" fill="#9CA3AF" font-size="12" font-weight="700" letter-spacing="1.5">TOTAL BALANCE</text>
  <text x="820" y="288" fill="#111827" font-size="46" font-weight="800" letter-spacing="-1">$3.84<tspan fill="#9CA3AF" font-size="23" font-weight="700"> M</tspan></text>
  <text x="820" y="324" fill="#16A34A" font-size="15" font-weight="700">▲ +12.4%</text>
  <rect x="820" y="352" width="150" height="44" rx="12" fill="#3182F6"/>
  <text x="895" y="380" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">Send</text>
  <rect x="980" y="352" width="116" height="44" rx="12" fill="#F1F5F9"/>
  <text x="1038" y="380" text-anchor="middle" fill="#475569" font-size="15" font-weight="700">Cancel</text>
  <text x="788" y="460" fill="#059669" font-size="14" font-weight="600">✓ one accent · one radius · tinted greys</text>
</svg>
