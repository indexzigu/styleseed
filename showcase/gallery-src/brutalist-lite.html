<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: "Space Grotesk", sans-serif; background: #F4F1E9; color: #0A0A0A; -webkit-font-smoothing: antialiased; }
  .wrap { width: 1240px; height: 860px; padding: 40px 56px; display: flex; flex-direction: column; }
  .b { border: 2px solid #0A0A0A; }
  .hard { box-shadow: 5px 5px 0 #0A0A0A; }
  .cobalt { background:#2E2EFF; color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="b" style="display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:#fff;">
    <span style="font-weight:700;font-size:22px;letter-spacing:-0.02em;">RELAY</span>
    <div style="display:flex;align-items:center;gap:24px;font-size:14px;font-weight:600;">
      <span>PRODUCT</span><span>PRICING</span>
      <span class="cobalt b hard" style="padding:8px 18px;font-weight:700;">START FREE</span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:28px;flex:1;padding-top:28px;">
    <div class="b hard" style="background:#fff;padding:40px;display:flex;flex-direction:column;justify-content:center;">
      <span class="cobalt" style="align-self:flex-start;font-size:13px;font-weight:700;padding:5px 12px;">REVENUE INFRASTRUCTURE</span>
      <h1 style="font-size:74px;line-height:0.98;font-weight:700;letter-spacing:-0.03em;margin-top:20px;">PAYMENTS THAT CLOSE THEMSELVES.</h1>
      <p style="font-size:17px;line-height:1.5;font-weight:500;margin-top:22px;max-width:40ch;">Relay chases every invoice, reconciles the cash, forecasts next month. No spreadsheets. No chasing.</p>
      <div style="display:flex;gap:16px;margin-top:30px;">
        <span class="cobalt b hard" style="font-weight:700;font-size:15px;padding:14px 28px;">START FREE</span>
        <span class="b" style="background:#fff;font-weight:700;font-size:15px;padding:14px 28px;">BOOK A DEMO</span>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:22px;">
      <div class="b hard" style="background:#fff;padding:26px;">
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;">Monthly revenue</div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-top:10px;"><span style="font-size:52px;font-weight:700;letter-spacing:-0.03em;">$48.2<span style="font-size:24px;">K</span></span></div>
        <div class="cobalt b" style="display:inline-block;font-size:13px;font-weight:700;padding:3px 10px;margin-top:8px;">▲ 8.2%</div>
      </div>
      <div class="b hard cobalt" style="padding:26px;">
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;">Active accounts</div>
        <div style="font-size:52px;font-weight:700;letter-spacing:-0.03em;margin-top:10px;">1,284</div>
      </div>
      <div class="b hard" style="background:#fff;padding:22px 26px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;"><span style="font-size:13px;font-weight:700;text-transform:uppercase;">On-time</span><span style="font-size:34px;font-weight:700;letter-spacing:-0.02em;">99.4%</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
